name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push Docker image
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/learnwithme-app
          SHA_TAG=${IMAGE}:${{ github.sha }}
          LATEST_TAG=${IMAGE}:latest
          docker build -t ${SHA_TAG} -t ${LATEST_TAG} .
          docker push ${SHA_TAG}
          docker push ${LATEST_TAG}

  deploy-to-k3s:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Setup SSH Context and Deploy
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ubuntu
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts

          # Copy k8s manifests to server
          scp -i ~/.ssh/key.pem -r k8s/ $USER@$HOST:~/k8s-manifests/

          # FIX: Set KUBECONFIG so kubectl finds the K3s config, then apply manifests
          ssh -i ~/.ssh/key.pem $USER@$HOST "
            export KUBECONFIG=/home/ubuntu/.kube/config
            kubectl apply -f ~/k8s-manifests/app-deployment.yaml
            kubectl apply -f ~/k8s-manifests/ingress.yaml
            kubectl rollout restart deployment learnwithme-app
            kubectl rollout status deployment learnwithme-app --timeout=120s
          "

