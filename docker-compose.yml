version: '3.8'

services:
  dualsub:
    build: .
    container_name: dualsub-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      # ALLOWED_ORIGIN is set automatically by setup-ec2.sh (or defaults to localhost)
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:3001,http://localhost:5173}

      # Optionally add your DeepL API Key here for better translations:
      - DEEPL_KEY=your-deepl-api-key-here
    volumes:
      # Persist the cache directory so you don't redownload/translate video data on container restarts
      - dualsub-cache:/app/backend/cache
      # Mount cookies.txt if it exists to fix YouTube blocking
      - ./cookies.txt:/app/backend/cookies.txt

volumes:
  dualsub-cache:
